<svg
  class="absolute inset-0 w-full h-full"
  viewBox="0 0 1000 450"
  preserveAspectRatio="xMidYMid slice"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Bottom-left green ambient -->
    <radialGradient id="greenGlow" cx="0%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#60A839" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <!-- Moonlight emission glow -->
    <radialGradient id="centerGlow" cx="54%" cy="30%" r="35%">
      <stop offset="0%"  stop-color="#c7d2fe" stop-opacity="0.22" />
      <stop offset="35%" stop-color="#a5b4fc" stop-opacity="0.1" />
      <stop offset="70%" stop-color="#818cf8" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <!-- Reduced blur: stdDeviation 18 keeps it tight rather than screen-wide -->
    <filter id="blurCenter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" />
    </filter>

  </defs>


  <!-- Base green ambient -->
  <rect width="100%" height="100%" fill="url(#greenGlow)" />

  <!-- Slow-drifting cloud glow 1 — top-right primary cloud -->
  <g filter="url(#blurCenter)" opacity="0.22">
    <g fill="#a5b4fc">
      <animateTransform attributeName="transform" type="translate"
        values="-28 0; 28 0; -28 0" dur="28s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1" />
      <ellipse cx="800" cy="100" rx="118" ry="26" />
      <ellipse cx="732" cy="80"  rx="68"  ry="40" />
      <ellipse cx="800" cy="68"  rx="72"  ry="44" />
      <ellipse cx="872" cy="76"  rx="62"  ry="36" />
    </g>
  </g>

  <!-- Slow-drifting cloud glow 2 — top-right secondary cloud, drifts opposite -->
  <g filter="url(#blurCenter)" opacity="0.13">
    <g fill="#a5b4fc">
      <animateTransform attributeName="transform" type="translate"
        values="22 0; -22 0; 22 0" dur="40s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1" />
      <ellipse cx="800" cy="107" rx="96" ry="20" />
      <ellipse cx="752" cy="91"  rx="56" ry="30" />
      <ellipse cx="844" cy="86"  rx="52" ry="27" />
    </g>
  </g>

  <!-- Soft radial colour wash on top to add depth -->
  <rect width="100%" height="100%" fill="url(#centerGlow)" />

  <!-- Subtle green wave at bottom -->
  <path
    d="M-100 350 C 200 300 400 400 600 350 S 900 300 1100 350"
    stroke="#60A839"
    stroke-width="1.5"
    fill="none"
    opacity="0.2"
  />

  <!-- Small accent glints (amber swapped to CTA indigo-300) -->
  <circle cx="200" cy="150" r="1.5" fill="#a5b4fc" opacity="0.3">
    <animate
      attributeName="opacity"
      values="0.15;0.45;0.15"
      dur="4s"
      repeatCount="indefinite"
    />
  </circle>
  <circle cx="850" cy="280" r="1.5" fill="#60A839" opacity="0.4" />
  <circle cx="400" cy="100" r="1"   fill="#a5b4fc" opacity="0.25" />
</svg>
