<svg
  class="block md:hidden w-full h-full"
  viewBox="0 0 400 700"
  preserveAspectRatio="xMidYMid slice"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <radialGradient id="mobileGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.25" />
      <stop offset="40%" stop-color="#a5b4fc" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <filter id="mobileMoonBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#020617" />
  <rect width="100%" height="100%" fill="url(#mobileGlow)" />

  <g opacity="0.3" filter="url(#mobileMoonBlur)">
    <circle cx="200" cy="280" r="22" fill="#e2e8f0" />
    <circle cx="200" cy="280" r="32" fill="#c7d2fe" opacity="0.4" />
  </g>

  <circle cx="80" cy="120" r="1.9" fill="#a5b4fc" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="320" cy="550" r="3.6" fill="#a5b4fc" opacity="0.3" />
  
  <circle cx="210" cy="100" r="2.5" fill="#60A839" opacity="0.4" />
</svg>